<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" width="720" height="180" role="img" aria-label="Snowglobe">
  <title>Snowglobe</title>

  <style>
    .wordmark { fill: #003660; }
    .tagline  { fill: #1D292E; opacity: 0.78; }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #FFFFFF; }
      .tagline  { fill: #C1E0F4; opacity: 0.95; }
    }
  </style>

  <!-- Icon -->
  <g transform="translate(20, 10)">
    <!-- Base (stand) -->
    <path d="M 38 142 L 142 142 L 130 168 L 50 168 Z" fill="#003660"/>
    <rect x="40" y="135" width="100" height="9" rx="2.5" fill="#009ED8"/>

    <!-- Sphere fill -->
    <circle cx="90" cy="80" r="62" fill="#C1E0F4"/>

    <!-- Snowflake -->
    <g transform="translate(90, 80)" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none">
      <g>
        <line x1="0" y1="-38" x2="0" y2="38"/>
        <line x1="0" y1="-38" x2="-8" y2="-30"/>
        <line x1="0" y1="-38" x2="8" y2="-30"/>
        <line x1="0" y1="38" x2="-8" y2="30"/>
        <line x1="0" y1="38" x2="8" y2="30"/>
        <line x1="0" y1="-18" x2="-7" y2="-22"/>
        <line x1="0" y1="-18" x2="7" y2="-22"/>
        <line x1="0" y1="18" x2="-7" y2="22"/>
        <line x1="0" y1="18" x2="7" y2="22"/>
      </g>
      <g transform="rotate(60)">
        <line x1="0" y1="-38" x2="0" y2="38"/>
        <line x1="0" y1="-38" x2="-8" y2="-30"/>
        <line x1="0" y1="-38" x2="8" y2="-30"/>
        <line x1="0" y1="38" x2="-8" y2="30"/>
        <line x1="0" y1="38" x2="8" y2="30"/>
      </g>
      <g transform="rotate(120)">
        <line x1="0" y1="-38" x2="0" y2="38"/>
        <line x1="0" y1="-38" x2="-8" y2="-30"/>
        <line x1="0" y1="-38" x2="8" y2="-30"/>
        <line x1="0" y1="38" x2="-8" y2="30"/>
        <line x1="0" y1="38" x2="8" y2="30"/>
      </g>
    </g>

    <!-- Yellow accent stray flakes -->
    <circle cx="128" cy="55" r="3" fill="#FFC528"/>
    <circle cx="56" cy="108" r="2.5" fill="#FFC528"/>

    <!-- Glass highlight -->
    <path d="M 45 60 Q 50 32, 78 26" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.85"/>

    <!-- Sphere outline (drawn last so it sits above fill) -->
    <circle cx="90" cy="80" r="62" fill="none" stroke="#009ED8" stroke-width="4"/>
  </g>

  <!-- Wordmark -->
  <text x="200" y="105" class="wordmark"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" letter-spacing="-1">Snowglobe</text>

  <!-- Tagline -->
  <text x="202" y="138" class="tagline"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400">Explainable cost and access visibility for Snowflake</text>
</svg>
