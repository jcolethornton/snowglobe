# Default profile — everyday analyst usage
default:
  user: "analyst_user"          # Snowflake username
  password: "replace_me"        # Password or key-pair path
  account: "your_account"       # e.g., abc123.us-east-1
  role: "ANALYST"               # Default role to assume
  warehouse: "COMPUTE_WH"       # Default warehouse

# Production profile — for admins or power users
prod:
  user: "admin_user"
  password: "replace_me"
  account: "your_account"
  role: "SYSADMIN"
  warehouse: "ETL_WH"

# Optional: sandbox / test profile
sandbox:
  user: "sandbox_user"
  password: "replace_me"
  account: "your_account"
  role: "DEV_ROLE"
  warehouse: "TEST_WH"

# Notes:
# - You can add more profiles for different accounts or roles.
# - Snowflake key-pair auth for production.
# - Profiles are selected with --profile <name> CLI flag.
